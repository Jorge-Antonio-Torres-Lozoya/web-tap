<aside class="sidebar" [class.sidebar--open]="menuOpen()">
  <div class="sb-brand">
    <div class="sb-brand__lg"><app-logo-mark /></div>
    <div>
      <b>Grupo TAP</b>
      <small>Port Terminal Admin</small>
    </div>
  </div>

  <div class="sb-sec"><span class="eyebrow">Secciones</span></div>
  <nav class="sb-nav">
    @for (item of nav(); track item.slug) {
      <a class="sb-item" [routerLink]="item.path" routerLinkActive="active" (click)="closeMenu()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          @switch (item.slug) {
            @case ('products') {
              <path d="M3 7l9-4 9 4-9 4-9-4Z" /><path d="M3 7v10l9 4 9-4V7" /><path d="M12 11v10" />
            }
            @case ('users') {
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" />
            }
            @case ('profiles') {
              <rect x="3" y="4" width="18" height="16" rx="2" /><path d="M3 9h18M8 4v16" />
            }
          }
        </svg>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="sb-foot">
    @if (user(); as u) {
      <div class="sb-user">
        <div class="sb-user__avatar">{{ u.name.charAt(0) }}</div>
        <div class="who">
          <b>{{ u.name }}</b>
          <small>{{ u.code }}</small>
        </div>
        <button class="out" type="button" title="Cerrar sesión" (click)="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
          </svg>
        </button>
      </div>
    }
  </div>
</aside>

<div class="shell-backdrop" [class.show]="menuOpen()" (click)="closeMenu()"></div>

<div class="main-wrap">
  <header class="topbar">
    <button class="iconbtn-top hamburger" type="button" (click)="toggleMenu()" aria-label="Abrir menú">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M3 6h18M3 12h18M3 18h18" />
      </svg>
    </button>
    <div class="tt">Port Terminal Admin <span>· {{ currentLabel() }}</span></div>
    <div class="topbar__sp"></div>
    <button class="iconbtn-top" type="button" title="Cerrar sesión" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
      </svg>
    </button>
  </header>

  <main class="content">
    <router-outlet />
  </main>
</div>
